<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Vinhomes Green Paradise — Gallery</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Mono:wght@300;400&family=Be+Vietnam+Pro:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  /* Brand palette */
  --green:       #009b51;
  --dark-green:  #05785c;
  --teal:        #005050;
  --dark-teal:   #00464e;
  --light-gold:  #f6dfac;
  --bold-gold:   #e2b055;
  --golden-sand: #d4903a;
  --white:       #ffffff;

  --bg:          #021e1a;
  --surface:     #062e28;
  --surface2:    #083830;
  --border:      rgba(0,155,81,0.18);
  --text:        #e8f5ef;
  --text-muted:  rgba(232,245,239,0.5);
  --serif:       'Cormorant Garamond', serif;
  --sans:        'Be Vietnam Pro', sans-serif;
  --mono:        'DM Mono', monospace;
}

html{scroll-behavior:smooth}
body{font-family:var(--sans);background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}

/* ── NOISE ── */
body::after{
  content:'';position:fixed;inset:0;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");
  pointer-events:none;z-index:9999;mix-blend-mode:overlay
}

/* ── HERO HEADER ── */
.hero{
  position:relative;
  min-height:320px;
  background:linear-gradient(135deg, var(--dark-teal) 0%, var(--teal) 40%, var(--dark-green) 75%, var(--green) 100%);
  display:flex;flex-direction:column;justify-content:flex-end;
  padding:48px 52px 44px;
  overflow:hidden;
}
.hero::before{
  content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse 80% 60% at 70% 120%, rgba(226,176,85,0.12) 0%, transparent 60%);
}
.hero-logo{
  display:flex;align-items:center;gap:14px;
  margin-bottom:28px;
}
.logo-icon{width:52px;height:52px}
.logo-text .brand{font-family:var(--mono);font-size:.68rem;letter-spacing:.2em;text-transform:uppercase;color:var(--bold-gold);margin-bottom:2px}
.logo-text h1{font-family:var(--serif);font-size:clamp(2rem,4vw,3.4rem);font-weight:300;line-height:1;color:var(--white)}
.logo-text h1 strong{font-weight:600;font-style:italic;color:var(--bold-gold)}
.logo-text .sub{font-family:var(--mono);font-size:.62rem;letter-spacing:.18em;color:rgba(255,255,255,.5);text-transform:uppercase;margin-top:6px}

.hero-tagline{
  font-family:var(--serif);font-style:italic;font-size:1.15rem;font-weight:300;
  color:rgba(255,255,255,.7);max-width:560px;line-height:1.6;
}

.hero-stats{
  position:absolute;top:40px;right:52px;
  display:flex;gap:28px;
}
.stat{text-align:right}
.stat-val{font-family:var(--mono);font-size:1.5rem;color:var(--bold-gold)}
.stat-label{font-family:var(--mono);font-size:.58rem;letter-spacing:.12em;text-transform:uppercase;color:var(--text-muted)}

/* diagonal accent */
.hero-accent{
  position:absolute;bottom:0;right:0;width:380px;height:380px;
  background:linear-gradient(45deg,transparent,rgba(0,155,81,.08));
  clip-path:polygon(100% 0,100% 100%,0 100%);
}

/* ── NAV FILTERS ── */
.nav-bar{
  position:sticky;top:0;z-index:100;
  background:rgba(2,30,26,.92);
  backdrop-filter:blur(12px);
  border-bottom:1px solid var(--border);
  padding:0 52px;
  display:flex;align-items:stretch;gap:0;
  overflow-x:auto;
  scrollbar-width:none;
}
.nav-bar::-webkit-scrollbar{display:none}

.nav-btn{
  flex-shrink:0;
  padding:16px 22px;
  background:none;border:none;
  font-family:var(--mono);font-size:.62rem;letter-spacing:.12em;text-transform:uppercase;
  color:var(--text-muted);
  cursor:pointer;
  border-bottom:2px solid transparent;
  transition:all .22s ease;
  position:relative;
  white-space:nowrap;
}
.nav-btn:hover{color:var(--text);border-bottom-color:var(--dark-green)}
.nav-btn.active{color:var(--bold-gold);border-bottom-color:var(--bold-gold)}
.nav-btn .rank-badge{
  display:inline-flex;align-items:center;justify-content:center;
  width:16px;height:16px;border-radius:50%;
  background:var(--golden-sand);color:var(--bg);
  font-size:.5rem;font-weight:600;
  margin-right:6px;
}

/* ── MAIN ── */
main{padding:0 52px 80px}

/* ── SECTION ── */
.cat-section{padding-top:60px}
.cat-section.hidden{display:none}

.section-head{
  display:flex;align-items:flex-end;gap:20px;
  margin-bottom:32px;
  padding-bottom:20px;
  border-bottom:1px solid var(--border);
  position:relative;
}
.section-head::after{
  content:'';position:absolute;bottom:-1px;left:0;
  width:72px;height:2px;background:var(--green);
}

.section-badge{
  display:inline-flex;align-items:center;justify-content:center;
  width:32px;height:32px;border-radius:50%;
  font-family:var(--mono);font-size:.72rem;font-weight:600;
  flex-shrink:0;margin-bottom:4px;
}
.priority-1 .section-badge{background:var(--bold-gold);color:var(--bg)}
.priority-2 .section-badge{background:var(--green);color:var(--bg)}
.priority-3 .section-badge{background:var(--dark-green);color:var(--white)}
.priority-4 .section-badge{background:var(--teal);color:var(--white)}
.priority-5 .section-badge{background:var(--dark-teal);color:var(--white)}
.priority-6 .section-badge{background:var(--text-muted);color:var(--bg)}
.other .section-badge{background:var(--surface2);color:var(--text-muted);border:1px solid var(--border)}

.section-info{flex:1}
.section-tag{font-family:var(--mono);font-size:.58rem;letter-spacing:.18em;text-transform:uppercase;color:var(--text-muted);margin-bottom:4px}
.section-title{font-family:var(--serif);font-size:clamp(1.5rem,3vw,2.4rem);font-weight:300;line-height:1.1;color:var(--white)}
.section-title em{font-style:italic;color:var(--bold-gold)}
.section-desc{font-size:.82rem;line-height:1.6;color:var(--text-muted);margin-top:8px;max-width:600px}

.section-right{text-align:right;flex-shrink:0}
.img-count{font-family:var(--mono);font-size:.65rem;color:var(--text-muted)}
.priority-label{font-family:var(--mono);font-size:.58rem;letter-spacing:.12em;text-transform:uppercase;color:var(--golden-sand);margin-bottom:4px}

/* ── MASONRY ── */
.masonry{columns:4 240px;column-gap:14px}

/* ── CARD ── */
.card{
  break-inside:avoid;
  margin-bottom:14px;
  position:relative;
  overflow:hidden;
  cursor:pointer;
  background:var(--surface);
  border:1px solid var(--border);
  transition:transform .35s cubic-bezier(.34,1.56,.64,1), box-shadow .35s ease, border-color .3s ease;
  animation:cardIn .5s ease both;
}
@keyframes cardIn{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}

.card:hover{
  transform:translateY(-5px) scale(1.015);
  box-shadow:0 16px 48px rgba(0,0,0,.5);
  border-color:rgba(0,155,81,.45);
}

.card img{width:100%;display:block;transition:transform .55s ease;aspect-ratio:auto}
.card:hover img{transform:scale(1.06)}

/* ── OVERLAY ── */
.card-overlay{
  position:absolute;inset:0;
  background:linear-gradient(to top,rgba(2,30,26,.85) 0%,transparent 55%);
  opacity:0;transition:opacity .3s ease;
  display:flex;flex-direction:column;justify-content:flex-end;
  padding:14px;
}
.card:hover .card-overlay{opacity:1}
.card-title{font-family:var(--serif);font-size:.95rem;color:var(--white);font-weight:300;margin-bottom:4px}
.card-sub{font-family:var(--mono);font-size:.58rem;letter-spacing:.08em;text-transform:uppercase;color:var(--bold-gold)}

/* ── HEART ── */
.heart-btn{
  position:absolute;top:10px;right:10px;
  width:34px;height:34px;border-radius:50%;
  background:rgba(2,30,26,.72);border:1px solid rgba(255,255,255,.12);
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  opacity:0;transform:scale(.7);
  transition:opacity .25s ease, transform .35s cubic-bezier(.34,1.56,.64,1);
  z-index:10;backdrop-filter:blur(6px);
}
.card:hover .heart-btn{opacity:1;transform:scale(1)}
.heart-btn svg{width:16px;height:16px;fill:none;stroke:var(--bold-gold);stroke-width:2;transition:all .25s ease}
.heart-btn.liked svg{fill:var(--bold-gold)}
.heart-btn.liked{background:rgba(226,176,85,.15);border-color:var(--bold-gold)}
@keyframes heartPop{0%{transform:scale(1)}40%{transform:scale(1.5)}70%{transform:scale(.9)}100%{transform:scale(1)}}
.heart-btn.pop svg{animation:heartPop .4s ease}

/* ── HEART COUNT ── */
.heart-count{
  position:absolute;bottom:8px;right:8px;
  font-family:var(--mono);font-size:.58rem;
  color:var(--white);background:rgba(0,0,0,.5);
  padding:3px 8px;border-radius:20px;
  display:flex;align-items:center;gap:4px;
  opacity:0;transition:opacity .25s ease;backdrop-filter:blur(4px);
}
.card:hover .heart-count,.heart-count.show{opacity:1}
.heart-count svg{width:9px;height:9px;fill:var(--bold-gold)}

/* ── PLACEHOLDER CARD ── */
.card-placeholder{
  break-inside:avoid;margin-bottom:14px;
  background:var(--surface);border:1px dashed var(--border);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  min-height:180px;padding:24px;text-align:center;
  color:var(--text-muted);
}
.card-placeholder svg{width:32px;height:32px;margin-bottom:10px;opacity:.3}
.card-placeholder p{font-family:var(--mono);font-size:.62rem;letter-spacing:.1em}

/* ── INFO BANNER ── */
.info-banner{
  background:linear-gradient(135deg,rgba(0,80,80,.4),rgba(5,120,92,.2));
  border:1px solid rgba(0,155,81,.25);
  border-left:3px solid var(--green);
  padding:16px 20px;margin-bottom:20px;
  display:flex;gap:14px;align-items:flex-start;
}
.info-banner-icon{flex-shrink:0;margin-top:2px}
.info-banner-icon svg{width:18px;height:18px;fill:var(--green)}
.info-banner-body h4{font-family:var(--sans);font-size:.82rem;font-weight:600;color:var(--text);margin-bottom:4px}
.info-banner-body p{font-size:.78rem;line-height:1.6;color:var(--text-muted)}

/* ── PRIORITY DIVIDER ── */
.priority-divider{
  margin:56px 0 0;
  padding:16px 0 0;
  border-top:1px solid var(--border);
  font-family:var(--mono);font-size:.6rem;letter-spacing:.2em;
  text-transform:uppercase;color:var(--text-muted);
  display:flex;align-items:center;gap:16px;
}
.priority-divider::after{content:'';flex:1;height:1px;background:var(--border)}

/* ── FOOTER ── */
footer{
  border-top:1px solid var(--border);
  padding:32px 52px;
  display:flex;justify-content:space-between;align-items:center;
}
.footer-brand{font-family:var(--serif);font-style:italic;font-size:.95rem;color:var(--text-muted)}
.footer-hearts{display:flex;align-items:center;gap:8px;font-family:var(--mono);font-size:.65rem;color:var(--text-muted)}
.footer-hearts svg{width:14px;height:14px;fill:var(--bold-gold)}

/* ── LIGHTBOX ── */
.lightbox{
  display:none;position:fixed;inset:0;
  background:rgba(2,10,8,.95);
  z-index:10000;align-items:center;justify-content:center;flex-direction:column;
  backdrop-filter:blur(10px);
}
.lightbox.open{display:flex;animation:fadeIn .2s ease}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.lightbox img{max-width:90vw;max-height:78vh;object-fit:contain;box-shadow:0 24px 100px rgba(0,0,0,.8)}
.lb-meta{margin-top:20px;text-align:center}
.lb-title{font-family:var(--serif);font-style:italic;font-size:1.2rem;color:var(--white)}
.lb-sub{font-family:var(--mono);font-size:.62rem;letter-spacing:.15em;text-transform:uppercase;color:var(--bold-gold);margin-top:4px}
.lb-close{
  position:fixed;top:24px;right:30px;
  font-size:1.4rem;color:var(--text-muted);
  cursor:pointer;background:none;border:none;
  transition:color .2s;font-family:var(--mono);
}
.lb-close:hover{color:var(--white)}

/* ── RESPONSIVE ── */
@media(max-width:768px){
  .hero{padding:36px 24px 32px}
  .hero-stats{display:none}
  main,.nav-bar,footer{padding-left:20px;padding-right:20px}
  .masonry{columns:2 140px}
}
</style>
</head>

<!-- ══ NAV ══ -->
<nav class="nav-bar" id="nav-bar">

<main id="gallery-root"></main>

<footer>

<!-- ══ LIGHTBOX ══ -->
<div class="lightbox" id="lightbox">
  <button class="lb-close" id="lb-close">✕</button>
  <img id="lb-img" src="" alt=""/>
  <div class="lb-meta">
    <div class="lb-title" id="lb-title"></div>
    <div class="lb-sub" id="lb-sub"></div>
  </div>
</div>

/* ══════════════════════════════════════════════
   STATE
   ══════════════════════════════════════════════ */
let likes = JSON.parse(localStorage.getItem('vgp_likes') || '{}');
let activeFilter = 'all';

function saveLikes(){ localStorage.setItem('vgp_likes', JSON.stringify(likes)); }
function totalLikes(){ return Object.values(likes).reduce((a,b)=>a+b,0); }

/* ══════════════════════════════════════════════
   RENDER
   ══════════════════════════════════════════════ */
function priorityClass(cat){
  if(cat.group==='other') return 'other';
  const r = cat.rank;
  if(r===1) return 'priority-1';
  if(r===2) return 'priority-2';
  if(r===3) return 'priority-3';
  if(r===4) return 'priority-4';
  if(r===5) return 'priority-5';
  return 'priority-6';
}

function priorityLabel(cat){
  if(cat.group==='other') return 'Other';
  return `Ưu tiên #${cat.rank}`;
}

function badgeText(cat){
  if(cat.group==='other') return '•';
  return cat.rank;
}

function renderAll(){
  const root = document.getElementById('gallery-root');
  root.innerHTML = '';

  const visible = CATEGORIES.filter(c => {
    if(activeFilter==='all') return true;
    return c.group === activeFilter;
  });

  // Priority section first, then other
  const priority = visible.filter(c=>c.group==='priority');
  const other    = visible.filter(c=>c.group==='other');

  if(priority.length){
    if(activeFilter==='all'){
      const div = document.createElement('div');
      div.className='priority-divider';
      div.innerHTML='<span>Hạng mục ưu tiên cao</span>';
      root.appendChild(div);
    }
    priority.forEach((cat,i) => renderSection(cat, root, i));
  }

  if(other.length){
    const div = document.createElement('div');
    div.className='priority-divider';
    div.innerHTML='<span>Các hạng mục khác</span>';
    root.appendChild(div);
    other.forEach((cat,i) => renderSection(cat, root, i));
  }

  updateStats();
}

function renderSection(cat, root, i){
  const sec = document.createElement('section');
  sec.className = `cat-section ${priorityClass(cat)}`;
  sec.id = `sec-${cat.id}`;

  const infoHTML = cat.infoBanner ? `
    <div class="info-banner">
      <div class="info-banner-icon">
        <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-6h2v6zm0-8h-2V7h2v2z"/></svg>
      </div>
      <div class="info-banner-body">
        <h4>${cat.infoBanner.title}</h4>
        <p>${cat.infoBanner.body}</p>
      </div>
    </div>` : '';

  sec.innerHTML = `
    <div class="section-head">
      <div class="section-badge">${badgeText(cat)}</div>
      <div class="section-info">
        <div class="section-tag">${cat.tag}</div>
        <h2 class="section-title">${cat.label.replace(/([\w\s]+)/, '<em>$1</em>')}</h2>
        <p class="section-desc">${cat.desc}</p>
      </div>
      <div class="section-right">
        <div class="priority-label">${priorityLabel(cat)}</div>
        <div class="img-count" id="cnt-${cat.id}">${cat.images.length} ảnh</div>
      </div>
    </div>
    ${infoHTML}
    <div class="masonry" id="grid-${cat.id}"></div>
  `;
  root.appendChild(sec);

  const grid = sec.querySelector(`#grid-${cat.id}`);
  cat.images.forEach((img, idx) => {
    const liked = !!likes[img.id];
    const count = likes[img.id] || 0;
    const card = document.createElement('div');
    card.className = 'card';
    card.style.animationDelay = `${idx*55}ms`;
    card.innerHTML = `
      <img src="${img.src}" alt="${img.title}" loading="lazy"/>
      <div class="card-overlay">
        <div class="card-title">${img.title}</div>
        <div class="card-sub">${img.sub}</div>
      </div>
      <button class="heart-btn${liked?' liked':''}" data-id="${img.id}" title="Thả tim">
        <svg viewBox="0 0 24 24"><path d="M12 21C12 21 3 14.5 3 8.5C3 5.42 5.42 3 8.5 3C10.24 3 11.78 3.82 12 5C12.22 3.82 13.76 3 15.5 3C18.58 3 21 5.42 21 8.5C21 14.5 12 21 12 21Z" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
      <div class="heart-count${count>0?' show':''}" id="hc-${img.id}">
        <svg viewBox="0 0 24 24"><path d="M12 21C12 21 3 14.5 3 8.5C3 5.42 5.42 3 8.5 3C10.24 3 11.78 3.82 12 5C12.22 3.82 13.76 3 15.5 3C18.58 3 21 5.42 21 8.5C21 14.5 12 21 12 21Z"/></svg>
        <span>${count}</span>
      </div>
    `;
    card.querySelector('.heart-btn').addEventListener('click', e => {
      e.stopPropagation();
      toggleLike(img.id, card);
    });
    card.querySelector('img').addEventListener('click', ()=> openLB(img, cat));
    card.querySelector('.card-overlay').addEventListener('click', ()=> openLB(img, cat));
    grid.appendChild(card);
  });
}

function toggleLike(id, card){
  const btn = card.querySelector('.heart-btn');
  const hcWrap = card.querySelector('.heart-count');
  const hcSpan = hcWrap.querySelector('span');
  const wasLiked = !!likes[id];
  if(wasLiked){
    likes[id] = Math.max(0,(likes[id]||0)-1);
    if(likes[id]===0) delete likes[id];
    btn.classList.remove('liked');
  } else {
    likes[id] = (likes[id]||0)+1;
    btn.classList.add('liked');
    btn.classList.remove('pop');
    void btn.offsetWidth;
    btn.classList.add('pop');
  }
  const n = likes[id]||0;
  hcSpan.textContent = n;
  if(n>0) hcWrap.classList.add('show'); else hcWrap.classList.remove('show');
  saveLikes();
  updateStats();
}

function updateStats(){
  const total = CATEGORIES.length;
  const hearts = totalLikes();
  document.getElementById('s-total').textContent = total;
  document.getElementById('s-hearts').textContent = hearts;
  document.getElementById('footer-hearts-count').textContent = `${hearts} lượt thích`;
}

/* ══ LIGHTBOX ══ */
function openLB(img, cat){
  document.getElementById('lb-img').src = img.src.replace('w=500','w=1400').replace('w=700','w=1400');
  document.getElementById('lb-title').textContent = img.title;
  document.getElementById('lb-sub').textContent = `${cat.label} · ${cat.tag}`;
  document.getElementById('lightbox').classList.add('open');
  document.body.style.overflow='hidden';
}
function closeLB(){
  document.getElementById('lightbox').classList.remove('open');
  document.body.style.overflow='';
}
document.getElementById('lb-close').addEventListener('click',closeLB);
document.getElementById('lightbox').addEventListener('click',e=>{if(e.target===e.currentTarget)closeLB();});
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeLB();});

/* ══ NAV FILTER ══ */
document.getElementById('nav-bar').addEventListener('click',e=>{
  const btn = e.target.closest('.nav-btn');
  if(!btn) return;
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  activeFilter = btn.dataset.filter;
  renderAll();
});

/* ══ INIT ══ */
renderAll();
</script>
